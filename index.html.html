<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aanand Aaradh Pal | Portfolio</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- React & Babel for Standalone Browser Execution -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Space Grotesk', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Dynamic Background Blobs */
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(40px, -60px) scale(1.1); }
      66% { transform: translate(-30px, 30px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 10s infinite alternate ease-in-out; }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }

    /* Complex Float & Sway for Services */
    @keyframes float-complex {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-10px) rotate(1deg); }
      50% { transform: translateY(-15px) rotate(0deg); }
      75% { transform: translateY(-10px) rotate(-1deg); }
    }
    .animate-float-complex { animation: float-complex 8s ease-in-out infinite; }
    
    /* Breathing Scale for Stats & Buttons */
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .animate-breathe { animation: breathe 4s ease-in-out infinite; }

    /* Sharp Blinking Light */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .animate-blink { animation: blink 1.2s step-end infinite; }

    /* Neon Flicker Text */
    @keyframes neon-flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { 
        opacity: 1; 
        text-shadow: 0 0 10px rgba(245,158,11,0.5), 0 0 20px rgba(245,158,11,0.5), 0 0 40px rgba(245,158,11,0.5); 
      }
      20%, 24%, 55% { 
        opacity: 0.7; 
        text-shadow: none; 
      }
    }
    .animate-flicker { animation: neon-flicker 4s infinite alternate; }

    /* Fast Gradient Flow */
    .gradient-text-main {
      background: linear-gradient(to right, #10b981, #06b6d4, #3b82f6, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 300% auto;
      animation: gradient-fast 3s linear infinite;
    }
    .gradient-text-accent {
      background: linear-gradient(to right, #ec4899, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 200% auto;
      animation: gradient-fast 3s linear infinite;
    }
    @keyframes gradient-fast {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    
    .text-glow-main { text-shadow: 0 0 60px rgba(6, 182, 212, 0.7); }
    
    html { scroll-behavior: smooth; }
    body { background-color: #03050a; }
    ::-webkit-scrollbar { width: 8px; }
    @media (min-width: 640px) { ::-webkit-scrollbar { width: 12px; } }
    ::-webkit-scrollbar-track { background: #03050a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 6px; border: 2px solid #03050a; }
    ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Inline Lucide Icons ---
    const IconWrapper = ({ children, className, style }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>{children}</svg>
    );
    const Code = (props) => <IconWrapper {...props}><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></IconWrapper>;
    const Layout = (props) => <IconWrapper {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></IconWrapper>;
    const Zap = (props) => <IconWrapper {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></IconWrapper>;
    const CheckCircle = (props) => <IconWrapper {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconWrapper>;
    const Users = (props) => <IconWrapper {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></IconWrapper>;
    const Briefcase = (props) => <IconWrapper {...props}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></IconWrapper>;
    const MessageCircle = (props) => <IconWrapper {...props}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></IconWrapper>;
    const Send = (props) => <IconWrapper {...props}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></IconWrapper>;
    const Sparkles = (props) => <IconWrapper {...props}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path></IconWrapper>;
    const ArrowRight = (props) => <IconWrapper {...props}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></IconWrapper>;
    const Menu = (props) => <IconWrapper {...props}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></IconWrapper>;
    const X = (props) => <IconWrapper {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconWrapper>;

    // --- Custom Hooks ---
    const useScrollReveal = () => {
      const [isVisible, setIsVisible] = useState(false);
      const domRef = useRef();

      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 }); 

        const currentRef = domRef.current;
        if (currentRef) observer.observe(currentRef);

        return () => {
          if (currentRef) observer.unobserve(currentRef);
        };
      }, []);

      return [domRef, isVisible];
    };

    // --- Components ---
    const Reveal = ({ children, direction = 'up', delay = 0, className = "" }) => {
      const [ref, isVisible] = useScrollReveal();
      
      const baseClasses = "transition-all duration-1000 ease-out w-full";
      const hiddenClasses = {
        up: "opacity-0 translate-y-12 md:translate-y-16",
        down: "opacity-0 -translate-y-12 md:-translate-y-16",
        left: "opacity-0 translate-x-12 md:translate-x-16",
        right: "opacity-0 -translate-x-12 md:-translate-x-16",
        scale: "opacity-0 scale-90"
      };
      const visibleClasses = "opacity-100 translate-y-0 translate-x-0 scale-100";

      return (
        <div 
          ref={ref} 
          className={`${baseClasses} ${isVisible ? visibleClasses : hiddenClasses[direction]} ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );
    };

    const BackgroundEffects = () => (
      <div className="fixed inset-0 z-0 overflow-hidden pointer-events-none bg-[#03050a]">
        <div className="absolute top-[-10%] left-[-20%] md:top-[-20%] md:left-[-10%] w-[80%] md:w-[50%] h-[50%] rounded-full bg-emerald-600/20 blur-[120px] md:blur-[150px] animate-blob mix-blend-screen"></div>
        <div className="absolute top-[30%] right-[-20%] md:right-[-10%] w-[70%] md:w-[40%] h-[60%] rounded-full bg-fuchsia-600/15 blur-[120px] md:blur-[150px] animate-blob animation-delay-2000 mix-blend-screen"></div>
        <div className="absolute bottom-[-10%] left-[10%] md:bottom-[-20%] md:left-[20%] w-[80%] md:w-[50%] h-[50%] rounded-full bg-blue-600/20 blur-[120px] md:blur-[150px] animate-blob animation-delay-4000 mix-blend-screen"></div>
        <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwdjIwaDIwVjIwaC0yMHptMC0yMHYyMGgyMFYwaC0yMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMikiIGZpbGwtcnVsZT0iZXZlbm9kZCIvPjwvc3ZnPg==')] [mask-image:linear-gradient(to_bottom,white,transparent,transparent)] opacity-30"></div>
      </div>
    );

    const Navbar = () => {
      const [scrolled, setScrolled] = useState(false);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const whatsappUrl = "https://wa.me/917764812598?text=Hi%20Aanand,%20I%20saw%20your%20portfolio%20and%20would%20like%20to%20connect!";

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <React.Fragment>
          <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'py-4' : 'py-4 md:py-8'}`}>
            <div className={`container mx-auto px-4 md:px-12 flex justify-between items-center transition-all duration-500 ${scrolled ? 'bg-white/10 backdrop-blur-3xl border border-white/20 shadow-[0_8px_32px_0_rgba(0,0,0,0.5),inset_0_1px_0_rgba(255,255,255,0.3)] rounded-full py-3 px-6 md:px-8 mx-4 md:mx-auto max-w-5xl translate-y-2' : ''}`}>
              <a href="#" className="text-xl md:text-3xl font-black font-heading tracking-tight text-white flex items-center gap-2 z-50 group">
                <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gradient-to-br from-emerald-400 via-cyan-400 to-blue-500 flex items-center justify-center text-slate-900 text-sm md:text-base shadow-[0_0_15px_rgba(52,211,153,0.5),inset_0_2px_4px_rgba(255,255,255,0.8)] group-hover:scale-110 group-hover:rotate-12 transition-all duration-300">A.</div>
                <span className="drop-shadow-md">Aanand.</span>
              </a>
              
              <div className="hidden md:flex space-x-10 text-base font-bold text-slate-200 font-body">
                <a href="#services" className="hover:text-fuchsia-400 hover:-translate-y-1 hover:scale-105 transition-all duration-300 drop-shadow-sm">Services</a>
                <a href="#projects" className="hover:text-cyan-400 hover:-translate-y-1 hover:scale-105 transition-all duration-300 drop-shadow-sm">Projects</a>
                <a href="#contact" className="hover:text-amber-400 hover:-translate-y-1 hover:scale-105 transition-all duration-300 drop-shadow-sm">Contact</a>
              </div>
              
              <div className="flex items-center gap-3 md:gap-4 z-50">
                <a 
                  href={whatsappUrl} 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="px-5 py-2.5 rounded-full bg-gradient-to-b from-[#25D366]/30 to-[#25D366]/10 border border-[#25D366]/50 hover:bg-[#25D366]/40 transition-all duration-300 text-sm font-bold text-white backdrop-blur-xl flex items-center gap-2 shadow-[0_8px_20px_rgba(37,211,102,0.3),inset_0_1px_0_rgba(255,255,255,0.4)] hover:-translate-y-1 hover:shadow-[0_12px_25px_rgba(37,211,102,0.5),inset_0_1px_0_rgba(255,255,255,0.5)] active:translate-y-0"
                >
                  <MessageCircle className="w-4 h-4 sm:w-5 sm:h-5 text-[#25D366] animate-pulse drop-shadow-[0_0_5px_rgba(37,211,102,0.8)]" />
                  <span className="hidden sm:inline font-body tracking-wide">Connect</span>
                </a>

                <button 
                  className="md:hidden p-2.5 rounded-full bg-white/10 border border-white/20 text-white backdrop-blur-xl shadow-[inset_0_1px_0_rgba(255,255,255,0.2)] active:scale-95 transition-all"
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                  aria-label="Toggle menu"
                >
                  {isMobileMenuOpen ? <X className="w-5 h-5" /> : <Menu className="w-5 h-5" />}
                </button>
              </div>
            </div>
          </nav>

          <div className={`fixed inset-0 z-40 bg-[#03050a]/80 backdrop-blur-3xl transition-all duration-500 md:hidden flex flex-col items-center justify-center ${isMobileMenuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
            <div className={`flex flex-col items-center space-y-8 text-2xl font-heading font-black text-white transition-all duration-500 transform ${isMobileMenuOpen ? 'translate-y-0 scale-100' : 'translate-y-12 scale-90'}`}>
              <a href="#services" onClick={() => setIsMobileMenuOpen(false)} className="hover:text-fuchsia-400 transition-colors drop-shadow-lg">Services</a>
              <a href="#projects" onClick={() => setIsMobileMenuOpen(false)} className="hover:text-cyan-400 transition-colors drop-shadow-lg">Projects</a>
              <a href="#contact" onClick={() => setIsMobileMenuOpen(false)} className="hover:text-amber-400 transition-colors drop-shadow-lg">Contact</a>
              
              <div className="w-16 h-[2px] bg-gradient-to-r from-transparent via-white/30 to-transparent my-6"></div>
              
              <a 
                href={whatsappUrl} 
                target="_blank" 
                rel="noopener noreferrer"
                onClick={() => setIsMobileMenuOpen(false)}
                className="px-8 py-4 rounded-full bg-gradient-to-b from-[#25D366] to-[#1da851] border border-[#25D366]/50 text-white flex items-center gap-3 shadow-[0_10px_30px_rgba(37,211,102,0.5),inset_0_2px_0_rgba(255,255,255,0.4)] text-xl active:scale-95 transition-transform animate-breathe"
              >
                <MessageCircle className="w-6 h-6 animate-pulse" />
                Chat on WhatsApp
              </a>
            </div>
          </div>
        </React.Fragment>
      );
    };

    const ProjectCard = ({ project, index }) => {
      return (
        <Reveal direction="up" delay={index * 100}>
          <div className={`group relative rounded-[2.5rem] overflow-hidden bg-gradient-to-b from-white/10 to-white/5 backdrop-blur-2xl border border-white/20 ${project.hoverBorder} transition-all duration-500 shadow-[0_10px_40px_rgba(0,0,0,0.6),inset_0_1px_0_rgba(255,255,255,0.2)] flex flex-col h-full hover:-translate-y-5 hover:scale-105 hover:-rotate-1 hover:shadow-[0_25px_60px_rgba(0,0,0,0.9),inset_0_1px_0_rgba(255,255,255,0.4)] perspective-1000`}>
            
            <div className={`absolute -inset-1 rounded-[2.5rem] opacity-0 group-hover:opacity-100 transition-opacity duration-500 blur-2xl z-[-1] bg-gradient-to-br ${project.glowGradient}`}></div>

            <div className="relative h-64 sm:h-72 w-full overflow-hidden bg-black border-b border-white/10 transform-style-3d">
              <div 
                className="absolute top-0 left-0 pointer-events-none" 
                style={{ 
                  width: '400%', 
                  height: '400%', 
                  transform: 'scale(0.25)', 
                  transformOrigin: '0 0' 
                }}
              >
                <iframe 
                  src={project.link} 
                  className="w-full h-full border-none pointer-events-none bg-white opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700" 
                  title={project.title}
                  scrolling="no"
                  tabIndex="-1"
                  loading="lazy"
                />
              </div>
              
              <div className="absolute inset-0 bg-gradient-to-t from-[#0a101f] via-[#0a101f]/40 to-transparent opacity-90 lg:group-hover:opacity-20 transition-opacity duration-700"></div>
              
              <div className="absolute top-5 left-5 flex gap-2">
                <span className={`px-4 py-2.5 rounded-full bg-black/60 backdrop-blur-xl text-xs sm:text-sm font-bold ${project.textColor} border border-white/10 flex items-center gap-2 shadow-[0_4px_15px_rgba(0,0,0,0.5),inset_0_1px_0_rgba(255,255,255,0.1)] font-body transform group-hover:scale-110 transition-transform duration-300`}>
                  <span className={`w-2.5 h-2.5 rounded-full ${project.dotColor} animate-blink shadow-[0_0_12px_currentColor]`}></span>
                  Live Preview
                </span>
              </div>
            </div>

            <div className="relative p-6 sm:p-8 flex-1 flex flex-col z-10 bg-gradient-to-t from-black/20 to-transparent">
              <h3 className={`text-2xl sm:text-3xl font-black text-white mb-3 sm:mb-4 font-heading drop-shadow-lg lg:group-hover:${project.textColor} transition-colors group-hover:translate-x-2 duration-500`}>
                {project.title}
              </h3>
              <p className="text-slate-300 mb-6 text-sm sm:text-base leading-relaxed flex-1 font-semibold font-body drop-shadow-sm group-hover:text-white transition-colors duration-500">
                {project.description}
              </p>
              
              <div className="flex items-center justify-between mt-auto pt-6 border-t border-white/10">
                <div className="flex gap-3">
                  <span className="w-10 h-10 rounded-full bg-white/5 backdrop-blur-xl flex items-center justify-center border border-white/10 shadow-[inset_0_1px_0_rgba(255,255,255,0.1)] group-hover:rotate-12 transition-transform duration-500">
                    <Code className="w-4 h-4 text-white" />
                  </span>
                  <span className="w-10 h-10 rounded-full bg-white/5 backdrop-blur-xl flex items-center justify-center border border-white/10 shadow-[inset_0_1px_0_rgba(255,255,255,0.1)] group-hover:-rotate-12 transition-transform duration-500">
                    <Layout className="w-4 h-4 text-white" />
                  </span>
                </div>
                <a 
                  href={project.link} 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className={`flex items-center gap-2 text-sm sm:text-base font-bold text-white ${project.hoverText} transition-all duration-300 group/link font-body bg-white/10 px-6 py-3 rounded-full border border-white/20 shadow-[0_5px_15px_rgba(0,0,0,0.3),inset_0_1px_0_rgba(255,255,255,0.2)] hover:bg-white/20 hover:-translate-y-2 hover:scale-110 hover:shadow-[0_12px_25px_rgba(0,0,0,0.5),inset_0_1px_0_rgba(255,255,255,0.3)]`}
                >
                  Visit <ArrowRight className="w-5 h-5 lg:group-hover/link:translate-x-2 transition-transform" />
                </a>
              </div>
            </div>
          </div>
        </Reveal>
      );
    };

    const ContactForm = () => {
      const [formData, setFormData] = useState({
        name: '',
        role: '',
        budget: '',
        message: ''
      });

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const { name, role, budget, message } = formData;
        let text = `Hi Aanand! 👋%0A%0AMy name is *${name}*`;
        if (role) text += ` (${role})`;
        text += `.%0A`;
        if (budget) text += `My estimated budget is: *${budget}*.%0A`;
        text += `%0A*Project Details:*%0A${message}%0A%0ALooking forward to discussing this with you!`;
        const whatsappUrl = `https://wa.me/917764812598?text=${text}`;
        window.open(whatsappUrl, '_blank');
      };

      const inputClasses = "w-full bg-black/50 backdrop-blur-2xl border border-white/10 rounded-2xl px-5 py-4 text-white text-base font-semibold font-body focus:outline-none transition-all placeholder:text-slate-500 shadow-[inset_0_4px_15px_rgba(0,0,0,0.6),0_1px_0_rgba(255,255,255,0.05)] focus:-translate-y-1 focus:shadow-[inset_0_2px_10px_rgba(0,0,0,0.4),0_10px_20px_rgba(0,0,0,0.4)]";

      return (
        <form onSubmit={handleSubmit} className="space-y-6 sm:space-y-8 relative z-10">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8">
            <div className="space-y-3 group">
              <label className="text-sm font-bold text-slate-300 uppercase tracking-widest font-body ml-2 drop-shadow-md group-focus-within:text-amber-400 transition-colors">Your Name *</label>
              <input 
                type="text" 
                name="name"
                required
                value={formData.name}
                onChange={handleChange}
                className={`${inputClasses} focus:border-amber-400 focus:bg-amber-900/10`}
                placeholder="John Doe"
              />
            </div>
            <div className="space-y-3 group">
              <label className="text-sm font-bold text-slate-300 uppercase tracking-widest font-body ml-2 drop-shadow-md group-focus-within:text-cyan-400 transition-colors">Company / Role</label>
              <input 
                type="text" 
                name="role"
                value={formData.role}
                onChange={handleChange}
                className={`${inputClasses} focus:border-cyan-400 focus:bg-cyan-900/10`}
                placeholder="CEO at TechCorp"
              />
            </div>
          </div>

          <div className="space-y-3 group">
            <label className="text-sm font-bold text-slate-300 uppercase tracking-widest font-body ml-2 drop-shadow-md group-focus-within:text-fuchsia-400 transition-colors">Estimated Budget</label>
            <div className="relative hover:-translate-y-1 transition-transform duration-300">
              <select 
                name="budget"
                value={formData.budget}
                onChange={handleChange}
